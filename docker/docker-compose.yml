version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zkkyc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zkkyc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zkkyc_secret}
      POSTGRES_DB: ${POSTGRES_DB:-zkkyc_dev}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-zkkyc}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zkkyc_redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Test profile — isolated DB for CI
  postgres_test:
    image: postgres:16-alpine
    container_name: zkkyc_postgres_test
    profiles: ['test']
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zkkyc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zkkyc_secret}
      POSTGRES_DB: zkkyc_test
    ports:
      - '${POSTGRES_TEST_PORT:-5433}:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-zkkyc}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  postgres_test_data:
